apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myingress
  annotations:

    alb.ingress.kubernetes.io/group.name: boutique-alb
    alb.ingress.kubernetes.io/group.order: "10"

    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/load-balancer-name: shop-ns-alb
    # Target Type and Listener Port


    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'

    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:736184860833:certificate/73bfac5f-b207-42de-ad3b-8cb43995dd14
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  ingressClassName: alb
  rules:
    - host: shop.devopswithravi.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend  # Or your main store frontend
                port:
                  number: 80

      # 👇 Default catch-all (matches any host not listed above)
    - host: ""
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend # or your default frontend
                port:
                  number: 80